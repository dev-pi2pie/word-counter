detector = "regex"

[inspect]
detector = "regex"

[path]
mode = "auto"
recursive = true
includeExtensions = [".md", ".markdown", ".mdx", ".mdc", ".txt"]
excludeExtensions = []
detectBinary = true

[progress]
mode = "auto"

[output]
totalOf = []

[reporting]
skippedFiles = false

[reporting.debugReport]
tee = false

[logging]
level = "info"
verbosity = "compact"
