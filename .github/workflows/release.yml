name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true
        type: string
      shallow_since:
        description: "Optional shallow fetch cutoff date (YYYY-MM-DD) for branch validation; leave blank to unshallow."
        required: false
        type: string

jobs:
  notes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      prerelease: ${{ steps.prerelease.outputs.IS_PRERELEASE }}
      prerelease_label: ${{ steps.prerelease.outputs.PRERELEASE_LABEL }}
      npm_publish_enabled: ${{ steps.prerelease.outputs.NPM_PUBLISH_ENABLED }}
      release_notes: ${{ steps.notes.outputs.content }}
      previous_tag: ${{ steps.range.outputs.previous_tag }}
      release_range: ${{ steps.range.outputs.range }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Keep checkout light; branch validation will deepen/unshallow if needed.
          # For workflow_dispatch, checkout the selected branch so current scripts/workflow code are available.
          # Tag resolution still comes from inputs.tag in later steps.
          fetch-depth: 1
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || (inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref) }}
          show-progress: false

      - name: Resolve tag
        id: tag
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          CLEAN_TAG_INPUT=$(printf '%s' "$TAG_INPUT" | tr -d '\r' | xargs)
          if [ -n "$CLEAN_TAG_INPUT" ]; then
            echo "tag=$CLEAN_TAG_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag is on allowed branch
        env:
          SHALLOW_SINCE: ${{ inputs.shallow_since }}
        run: |
          FETCH_DEPTH_ARGS=()
          if [ -n "$SHALLOW_SINCE" ]; then
            FETCH_DEPTH_ARGS=(--shallow-since="$SHALLOW_SINCE")
          elif [ -f .git/shallow ]; then
            git fetch origin --tags --unshallow
          fi

          git fetch origin --tags "${FETCH_DEPTH_ARGS[@]}"
          git fetch origin --no-tags main "${FETCH_DEPTH_ARGS[@]}"
          git fetch origin \
            --no-tags \
            "refs/heads/beta*:refs/remotes/origin/beta*" \
            "refs/heads/alpha*:refs/remotes/origin/alpha*" \
            "refs/heads/canary*:refs/remotes/origin/canary*" \
            "refs/heads/dev*:refs/remotes/origin/dev*" \
            "${FETCH_DEPTH_ARGS[@]}" || true
          TAG_COMMIT=$(git rev-list -n 1 "${{ steps.tag.outputs.tag }}")
          if git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"; then
            echo "Tag commit is on main."
            exit 0
          fi

          MATCHING_BRANCH=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin \
            | grep -Ei 'origin/.*(beta|alpha|canary|dev)' \
            | while read -r branch; do
                if git merge-base --is-ancestor "$TAG_COMMIT" "$branch"; then
                  echo "$branch"
                  break
                fi
              done)

          note() { echo "$1"; }
          if [ -n "$MATCHING_BRANCH" ]; then
            note "Tag commit is on allowed branch: $MATCHING_BRANCH"
          else
            note "Tag commit is not on main or an allowed branch (beta/alpha/canary/dev)." >&2
            exit 1
          fi

      - name: Check pre-release status
        id: prerelease
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          PRERELEASE_LABEL=""
          if [[ "$TAG_NAME" == *-alpha* ]]; then
            PRERELEASE_LABEL="alpha"
          elif [[ "$TAG_NAME" == *-beta* ]]; then
            PRERELEASE_LABEL="beta"
          elif [[ "$TAG_NAME" == *-rc* ]]; then
            PRERELEASE_LABEL="rc"
          elif [[ "$TAG_NAME" == *-canary* ]]; then
            PRERELEASE_LABEL="canary"
          fi

          if [[ -n "$PRERELEASE_LABEL" ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$PRERELEASE_LABEL" == "alpha" || "$PRERELEASE_LABEL" == "beta" ]]; then
            echo "NPM_PUBLISH_ENABLED=false" >> "$GITHUB_OUTPUT"
          else
            echo "NPM_PUBLISH_ENABLED=true" >> "$GITHUB_OUTPUT"
          fi

          echo "PRERELEASE_LABEL=$PRERELEASE_LABEL" >> "$GITHUB_OUTPUT"

      - name: Resolve release range
        id: range
        env:
          CURRENT_TAG: ${{ steps.tag.outputs.tag }}
          PRERELEASE: ${{ steps.prerelease.outputs.IS_PRERELEASE }}
          SHALLOW_SINCE: ${{ inputs.shallow_since }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)
          else
            PREVIOUS_TAG=$(git tag --merged "${CURRENT_TAG}^" --sort=-version:refname \
              | grep -Ev '(-alpha|-beta|-rc|-canary)' \
              | head -n1 || true)
          fi
          if [ -z "$PREVIOUS_TAG" ] && [ -f .git/shallow ] && [ -z "$SHALLOW_SINCE" ]; then
            git fetch origin --tags --unshallow
            if [ "$PRERELEASE" = "true" ]; then
              PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)
            else
              PREVIOUS_TAG=$(git tag --merged "${CURRENT_TAG}^" --sort=-version:refname \
                | grep -Ev '(-alpha|-beta|-rc|-canary)' \
                | head -n1 || true)
            fi
          fi
          if [ -n "$PREVIOUS_TAG" ]; then
            PREVIOUS_OID=$(git rev-parse "${PREVIOUS_TAG}^{commit}")
            CURRENT_OID=$(git rev-parse "${CURRENT_TAG}^{commit}")
            RANGE="${PREVIOUS_OID}..${CURRENT_OID}"
          else
            CURRENT_OID=$(git rev-parse "${CURRENT_TAG}^{commit}")
            RANGE="${CURRENT_OID}"
          fi
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"

      - name: Generate release notes (pre-release, GitHub default via git-cliff)
        id: prerelease_notes
        if: steps.prerelease.outputs.IS_PRERELEASE == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: github
          args: --strip header ${{ steps.range.outputs.range }}
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes (stable, curated aggregate)
        id: stable_notes
        if: steps.prerelease.outputs.IS_PRERELEASE != 'true'
        shell: bash
        env:
          RELEASE_RANGE: ${{ steps.range.outputs.range }}
          PREVIOUS_TAG: ${{ steps.range.outputs.previous_tag }}
          CURRENT_TAG: ${{ steps.tag.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SCRIPT_PATH="scripts/generate-stable-release-notes.sh"
          ARGS=(--mode "hybrid" --range "$RELEASE_RANGE" --current-tag "$CURRENT_TAG" --repository "$REPOSITORY")

          if [ -n "${PREVIOUS_TAG:-}" ]; then
            ARGS+=(--previous-tag "$PREVIOUS_TAG")
          fi

          NOTES="$("$SCRIPT_PATH" "${ARGS[@]}")"

          {
            echo "content<<__RELEASE_NOTES__"
            printf '%s\n' "$NOTES"
            echo "__RELEASE_NOTES__"
          } >> "$GITHUB_OUTPUT"

      - name: Select release notes content
        id: notes
        env:
          IS_PRERELEASE: ${{ steps.prerelease.outputs.IS_PRERELEASE }}
          PRERELEASE_NOTES: ${{ steps.prerelease_notes.outputs.content }}
          STABLE_NOTES: ${{ steps.stable_notes.outputs.content }}
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            SELECTED="$PRERELEASE_NOTES"
          else
            SELECTED="$STABLE_NOTES"
          fi

          {
            echo "content<<__RELEASE_NOTES__"
            printf '%s\n' "$SELECTED"
            echo "__RELEASE_NOTES__"
          } >> "$GITHUB_OUTPUT"

  prepare:
    runs-on: ubuntu-latest
    needs: notes
    permissions:
      contents: read
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ format('refs/tags/{0}', needs.notes.outputs.tag) }}
          show-progress: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/language-detector

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify package contents
        run: bun run verify:package-contents

      - name: Upload release package artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-package-${{ needs.notes.outputs.tag }}
          if-no-files-found: error
          path: |
            dist
            package.json
            README.md
            LICENSE*

  publish_npm:
    runs-on: ubuntu-latest
    needs:
      - notes
      - prepare
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download prepared package artifact
        uses: actions/download-artifact@v7
        with:
          name: release-package-${{ needs.notes.outputs.tag }}
          path: release-package

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure tag matches package version
        working-directory: release-package
        env:
          TAG_NAME: ${{ needs.notes.outputs.tag }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$TAG_NAME" != "$PKG_VERSION" && "$TAG_NAME" != "v$PKG_VERSION" ]]; then
            echo "Tag '$TAG_NAME' does not match package version '$PKG_VERSION'." >&2
            exit 1
          fi

      - name: Publish to npm
        working-directory: release-package
        env:
          TAG_NAME: ${{ needs.notes.outputs.tag }}
          IS_PRERELEASE: ${{ needs.notes.outputs.prerelease }}
          NPM_PUBLISH_ENABLED: ${{ needs.notes.outputs.npm_publish_enabled }}
          NODE_AUTH_TOKEN: ""
        run: |
          if [[ "$NPM_PUBLISH_ENABLED" != "true" ]]; then
            echo "Skipping npm publish for unsupported prerelease channel: '$TAG_NAME'."
            exit 0
          fi

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            npm publish --registry https://registry.npmjs.org --access public --tag next
          else
            npm publish --registry https://registry.npmjs.org --access public
          fi

  publish_github_packages:
    runs-on: ubuntu-latest
    needs:
      - notes
      - prepare
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download prepared package artifact
        uses: actions/download-artifact@v7
        with:
          name: release-package-${{ needs.notes.outputs.tag }}
          path: release-package

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@${{ github.repository_owner }}"

      - name: Set package name for GitHub Packages
        working-directory: release-package
        run: npm pkg set name=@${{ github.repository_owner }}/word-counter

      - name: Publish to GitHub Packages
        working-directory: release-package
        env:
          IS_PRERELEASE: ${{ needs.notes.outputs.prerelease }}
          PRERELEASE_LABEL: ${{ needs.notes.outputs.prerelease_label }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            npm publish --registry https://npm.pkg.github.com --access restricted --tag next
            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VERSION=$(node -p "require('./package.json').version")
            npm dist-tag add "$PKG_NAME@$PKG_VERSION" "$PRERELEASE_LABEL" --registry https://npm.pkg.github.com
          else
            npm publish --registry https://npm.pkg.github.com --access restricted
          fi

  release:
    runs-on: ubuntu-latest
    needs:
      - notes
      - publish_npm
      - publish_github_packages
    if: ${{ always() && needs.notes.result == 'success' && needs.publish_npm.result == 'success' && needs.publish_github_packages.result == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.notes.outputs.tag }}
          body: ${{ needs.notes.outputs.release_notes }}
          prerelease: ${{ needs.notes.outputs.prerelease == 'true' }}
