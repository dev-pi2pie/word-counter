name: Publish to NPM Packages

on:
  push:
    tags:
      - "*"
      - "!*-alpha*"
      - "!*-beta*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.2.3)"
        required: true
        type: string
      shallow_since:
        description: "Optional shallow fetch cutoff date (YYYY-MM-DD) for branch validation; leave blank to unshallow."
        required: false
        type: string

permissions:
  id-token: write # Required for OIDC authentication
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Keep checkout light; branch validation will deepen/unshallow if needed.
          fetch-depth: 1
          ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}
          show-progress: false

      - name: Resolve tag
        id: tag
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          CLEAN_TAG_INPUT=$(printf '%s' "$TAG_INPUT" | tr -d '\r' | xargs)
          if [ -n "$CLEAN_TAG_INPUT" ]; then
            echo "tag=$CLEAN_TAG_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag is on allowed branch
        env:
          SHALLOW_SINCE: ${{ inputs.shallow_since }}
        run: |
          FETCH_DEPTH_ARGS=()
          if [ -n "$SHALLOW_SINCE" ]; then
            FETCH_DEPTH_ARGS=(--shallow-since="$SHALLOW_SINCE")
          elif [ -f .git/shallow ]; then
            git fetch origin --tags --unshallow
          fi

          git fetch origin --tags "${FETCH_DEPTH_ARGS[@]}"
          git fetch origin --no-tags main "${FETCH_DEPTH_ARGS[@]}"
          git fetch origin \
            --no-tags \
            "refs/heads/beta*:refs/remotes/origin/beta*" \
            "refs/heads/alpha*:refs/remotes/origin/alpha*" \
            "refs/heads/canary*:refs/remotes/origin/canary*" \
            "refs/heads/dev*:refs/remotes/origin/dev*" \
            "${FETCH_DEPTH_ARGS[@]}" || true
          TAG_COMMIT=$(git rev-list -n 1 "${{ steps.tag.outputs.tag }}")
          if git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"; then
            echo "Tag commit is on main."
            exit 0
          fi

          MATCHING_BRANCH=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin \
            | grep -Ei 'origin/.*(beta|alpha|canary|dev)' \
            | while read -r branch; do
                if git merge-base --is-ancestor "$TAG_COMMIT" "$branch"; then
                  echo "$branch"
                  break
                fi
              done)

          note() { echo "$1"; }
          if [ -n "$MATCHING_BRANCH" ]; then
            note "Tag commit is on allowed branch: $MATCHING_BRANCH"
          else
            note "Tag commit is not on main or an allowed branch (beta/alpha/canary/dev)." >&2
            exit 1
          fi

      - name: Check pre-release status
        id: prerelease
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          if [[ "$TAG_NAME" == *-alpha* || "$TAG_NAME" == *-beta* || "$TAG_NAME" == *-rc* || "$TAG_NAME" == *-canary* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Block unsupported pre-release channels
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          if [[ "$TAG_NAME" == *-alpha* || "$TAG_NAME" == *-beta* ]]; then
            echo "Alpha and beta tags are intentionally excluded from npm publishing in this workflow: '$TAG_NAME'." >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/language-detector

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure tag matches package version
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$TAG_NAME" != "$PKG_VERSION" && "$TAG_NAME" != "v$PKG_VERSION" ]]; then
            echo "Tag '$TAG_NAME' does not match package version '$PKG_VERSION'." >&2
            exit 1
          fi

      - name: Build
        run: bun run build

      - name: Verify package contents
        run: bun run verify:package-contents

      - name: Publish
        env:
          # Clear inherited tokens so npm uses GitHub OIDC trusted publishing.
          NODE_AUTH_TOKEN: ""
        run: |
          if [[ "${{ steps.prerelease.outputs.IS_PRERELEASE }}" == "true" ]]; then
            npm publish --registry https://registry.npmjs.org --access public --tag next
          else
            npm publish --registry https://registry.npmjs.org --access public
          fi
